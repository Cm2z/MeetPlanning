services:
  mysql:
    image: mysql:8.4
    container_name: meetplanning-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: meetplanning
      MYSQL_USER: meetplanning
      MYSQL_PASSWORD: meetplanning123
      MYSQL_ROOT_PASSWORD: root1234
    ports:
      - "3306:3306"
    volumes:
      - meetplanning_mysql:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
volumes:
  meetplanning_mysql:
